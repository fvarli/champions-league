version: 2
updates:
  - package-ecosystem: composer
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      backend-dependencies:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      frontend-dependencies:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-dependencies:
        patterns: ['*']
        update-types: [minor, patch]
