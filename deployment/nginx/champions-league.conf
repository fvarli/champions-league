# Champions League Simulation — single-domain Nginx site.
#
# Layout served from one domain (champions.ferzendervarli.com):
#   /        -> Vue SPA static files (frontend/dist)
#   /api     -> Laravel API via PHP-FPM (backend/public/index.php)
#
# Because the SPA and API share one origin, no CORS is required in production.
# A two-domain variant is described in deployment/README.md.
#
# Install: copy to /etc/nginx/sites-available/champions-league.conf and symlink
# into /etc/nginx/sites-enabled/, then `nginx -t && systemctl reload nginx`.

# --- HTTP: redirect everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name champions.ferzendervarli.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name champions.ferzendervarli.com;

    # TLS — use a Cloudflare Origin Certificate (recommended behind Cloudflare)
    # or a Let's Encrypt certificate. Cloudflare SSL mode must be "Full (strict)".
    ssl_certificate     /etc/ssl/cloudflare/champions.ferzendervarli.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/champions.ferzendervarli.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Frontend (Vue SPA) document root.
    root /var/www/champions-league/frontend/dist;
    index index.html;

    # Reasonable upload ceiling for API requests.
    client_max_body_size 10m;

    # --- Security headers (also set by the API middleware; harmless to repeat) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml application/manifest+json;

    # Enable Brotli instead of/with gzip if the ngx_brotli module is installed:
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # --- Backend API (Laravel via PHP-FPM) ---
    location /api {
        root /var/www/champions-league/backend/public;
        try_files $uri /index.php?$query_string;
    }

    # Laravel front controller (reached via the try_files fallback above).
    location ~ ^/index\.php(/|$) {
        root /var/www/champions-league/backend/public;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60s;
    }

    # --- Static assets: hashed bundles are immutable, cache aggressively ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Icons / manifest / favicon — cache, but not forever.
    location ~* \.(?:png|svg|ico|webmanifest|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # The SPA entry point must never be cached.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # --- SPA fallback: serve files, otherwise hand routing to index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never serve dotfiles.
    location ~ /\.(?!well-known) {
        deny all;
    }
}
